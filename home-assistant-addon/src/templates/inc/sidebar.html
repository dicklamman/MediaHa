{# Shared sidebar template #}
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">MH</div>
        <div class="sidebar-brand">
            <h1 class="sidebar-title">MediaHa</h1>
            <p class="sidebar-subtitle">Media Converter</p>
        </div>
    </div>

    <nav class="sidebar-nav">
        <ul>
            {% for id, icon, label, href in nav_items %}
            <li id="nav-{{ id }}" class="{{ 'active' if page_id == id else '' }}">
                <a href="{{ href }}">
                    <span class="nav-icon material-icons">{{ icon }}</span>
                    <span>{{ label }}</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </nav>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <span>Theme</span>
        <span class="theme-toggle-icon">☀️</span>
    </button>
</aside>
