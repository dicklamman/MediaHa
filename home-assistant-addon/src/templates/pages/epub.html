{% extends "inc/base.html" %}

{% block extra_head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
{% endblock %}

{% block page_content %}
<div class="breadcrumb" id="breadcrumb-container">
    <span class="crumb" id="root-crumb">/media/eBook</span>
    <span id="dynamic-crumbs"></span>
</div>

<div class="file-browser" id="file-browser"></div>
<div id="result"></div>
{% endblock %}

{% block context_menu %}
<div id="context-menu" class="hidden">
    <button type="button" class="menu-item" id="menu-preview">Preview Book</button>
    <button type="button" class="menu-item" id="menu-rename">Rename</button>
    <button type="button" class="menu-item" id="menu-convert">Convert to 繁體 (Traditional)</button>
    <button type="button" class="menu-item" id="menu-edit-ass">Edit Subtitle (ASS)</button>
    <button type="button" class="menu-item" id="menu-edit-epub-metadata">Edit Metadata (EPUB)</button>
</div>
{% endblock %}

{% block page_modals %}
{% endblock %}

{% block extra_scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<script src="/js/fileBrowser.js" type="module"></script>
<script src="/js/mediaPreview.js" type="module"></script>
<script src="/js/epubPlayer.js" type="module"></script>
<script src="/js/epubMetadataEditor.js" type="module"></script>
<script type="module">
    import { fileBrowser } from '/js/fileBrowser.js';
    import { mediaPreview } from '/js/mediaPreview.js';
    import { epubPlayer } from '/js/epubPlayer.js';
    import { epubMetadataEditor } from '/js/epubMetadataEditor.js';
    import { api } from '/js/api.js';

    document.addEventListener('DOMContentLoaded', () => {
        fileBrowser.setBasePath('eBook');
        mediaPreview.init();
        epubPlayer.init();
        epubMetadataEditor.api = api;

        // EPUB Metadata Editor menu click handler
        const menuEditEpubMetadata = document.getElementById('menu-edit-epub-metadata');
        if (menuEditEpubMetadata) {
            menuEditEpubMetadata.addEventListener('click', async () => {
                const { ui } = await import('/js/ui.js');
                ui.hideContextMenu();
                const selectedFile = fileBrowser.selectedFile;
                if (selectedFile && selectedFile.name.toLowerCase().endsWith('.epub')) {
                    epubMetadataEditor.open(selectedFile, api);
                }
            });
        }
    });
</script>
{% endblock %}
