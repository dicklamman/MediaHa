<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox Sync - MediaHa</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="liquid-bg" aria-hidden="true"></div>

    <button id="mobile-nav-toggle" class="mobile-nav-toggle" aria-label="Toggle Navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <aside class="sidebar">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode"></button>
        <div class="sidebar-header">
            <h1 class="sidebar-title">MediaHa</h1>
            <p class="sidebar-subtitle">Media Converter</p>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li id="nav-home"><a href="index.html"><span class="nav-icon material-icons">home</span>Home</a></li>
                <li id="nav-epub"><a href="epub.html"><span class="nav-icon material-icons">menu_book</span>EPUB Converter</a></li>
                <li id="nav-mp3"><a href="mp3.html"><span class="nav-icon material-icons">library_music</span>MP3 Converter</a></li>
                <li id="nav-music-player"><a href="music-player.html"><span class="nav-icon material-icons">music_note</span>Music Player</a></li>
                <li id="nav-alist-video"><a href="alist-video.html"><span class="nav-icon material-icons">movie</span>AList Video</a></li>
                <li id="nav-alist"><a href="alist.html"><span class="nav-icon material-icons">link</span>AList to STRM</a></li>
                <li id="nav-dropbox" class="active"><a href="dropbox.html"><span class="nav-icon material-icons">cloud</span>Dropbox Sync</a></li>
                <li id="nav-calibre"><a href="calibre.html"><span class="nav-icon material-icons">library_books</span>Calibre Web Sync</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="page-header">
            <h2 class="page-title">Dropbox Sync</h2>
        </header>

        <div class="card">
            <div class="form-group">
                <label for="dropbox-app-key" class="form-label">Dropbox App Key</label>
                <input type="text" id="dropbox-app-key" class="form-input" placeholder="e.g. dbqe0tw...">
            </div>
            <div class="form-group">
                <label for="dropbox-app-secret" class="form-label">Dropbox App Secret</label>
                <input type="password" id="dropbox-app-secret" class="form-input" placeholder="e.g. nt1if1...">
            </div>
            <div class="form-group mb-md">
                <label for="dropbox-refresh-token" class="form-label">Refresh Token</label>
                <input type="password" id="dropbox-refresh-token" class="form-input" placeholder="Enter your long refresh token">
            </div>
            <button id="save-dropbox-settings" class="btn btn-primary">Save Settings</button>

            <div class="mt-md" style="display: flex; gap: var(--space-md); margin: var(--space-lg) 0;">
                <button id="sync-ebook-btn" class="btn btn-primary" style="flex: 1; font-weight: 600; padding: var(--space-md);">Sync eBook</button>
                <button id="sync-music-btn" class="btn btn-primary" style="flex: 1; font-weight: 600; padding: var(--space-md); background: #ab47bc;">Sync Music</button>
            </div>

            <h3 style="margin-bottom: var(--space-sm);">Sync Logs</h3>
            <pre id="dropbox-log-output" class="log-output"></pre>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/dropbox.js"></script>
</body>
</html>
