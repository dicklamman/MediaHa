<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Converter</title>
    <link rel="stylesheet" href="styles.css">
    <!-- EPUB.js for preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
    
    <div class="sidebar">
        <h2>Media Converter</h2>
        <ul>
            <li id="tab-epub" class="active">EPUB Converter</li>
            <li id="tab-mp3">MP3 Converter</li>
        </ul>
    </div>

    <div class="container main-content">
        <h1 id="page-title">EPUB Converter</h1>
        <div id="breadcrumb-container"><span class="crumb" id="root-crumb" style="cursor:pointer; font-weight:bold; color:#0056b3;">/media/eBook</span><span id="dynamic-crumbs"></span></div>
        <div id="file-browser">
            <!-- Items populated here -->
        </div>
        <div id="result"></div>
    </div>

    <!-- Right-click context menu -->
    <div id="context-menu" class="hidden">
        <div class="menu-item" id="menu-preview">Preview Book</div>
        <div class="menu-item" id="menu-rename">Rename</div>
        <div class="menu-item" id="menu-convert">Convert to 繁體 (Traditional)</div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="hidden">
        <div id="preview-header">
            <div>
                <button id="prev-page" class="btn">← Prev</button>
                <button id="next-page" class="btn">Next →</button>
            </div>
            <div style="font-weight: bold;" id="preview-title">Preview</div>
            <button id="close-preview" class="btn btn-close">Close ✖</button>
        </div>
        <div id="preview-content"></div>
    </div>

    <!-- MP3 Player Modal -->
    <div id="mp3-modal" class="hidden">
        <div id="mp3-header">
            <div style="font-weight: bold;" id="mp3-title">Music Player</div>
            <button id="close-mp3" class="btn btn-close">Close ✖</button>
        </div>
        <div id="mp3-content">
            <img id="mp3-cover" src="" alt="Album Art" style="max-width:300px; display:block; margin:auto;" />
            <audio id="mp3-audio" controls style="width: 100%; margin-top:10px;"></audio>
            
            <!-- Metadata Reader / Editor -->
            <div style="margin-top: 15px; border: 1px solid var(--border-color); padding: 15px; border-radius: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">Metadata</h3>
                    <div>
                        <button id="auto-enhance-btn" class="btn" style="background:#28a745; margin-right:5px;">Auto Enhance</button>
                        <button id="edit-metadata-btn" class="btn">Edit</button>
                        <button id="cancel-metadata-btn" class="btn rename-cancel hidden" style="margin-right:5px;">Cancel</button>
                        <button id="save-metadata-btn" class="btn rename-confirm hidden">Save</button>
                    </div>
                </div>
                
                <div id="metadata-display">
                    <p style="margin:5px 0;"><strong>Title:</strong> <span id="meta-disp-title">-</span></p>
                    <p style="margin:5px 0;"><strong>Artist:</strong> <span id="meta-disp-artist">-</span></p>
                    <p style="margin:5px 0;"><strong>Album:</strong> <span id="meta-disp-album">-</span></p>
                </div>

                <div id="metadata-editor" class="hidden">
                    <div style="margin-bottom: 10px;">
                        <label style="display:block; font-weight:bold; margin-bottom: 5px;">Title</label>
                        <input type="text" id="meta-input-title" class="rename-input" style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display:block; font-weight:bold; margin-bottom: 5px;">Artist</label>
                        <input type="text" id="meta-input-artist" class="rename-input" style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display:block; font-weight:bold; margin-bottom: 5px;">Album</label>
                        <input type="text" id="meta-input-album" class="rename-input" style="width: 100%; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display:block; font-weight:bold; margin-bottom: 5px;">Lyrics (.lrc file)</label>
                        <textarea id="meta-input-lyrics" class="rename-input" style="width: 100%; box-sizing: border-box; height: 100px; resize: vertical;"></textarea>
                    </div>
                </div>
            </div>

            <div id="mp3-lyrics" style="max-height: 200px; overflow-y:auto; margin-top:10px; padding:10px; background:var(--info-bg); white-space:pre-wrap; border-radius: 4px;"></div>
        </div>
    </div>

    <!-- Link the main module script -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
